version: '3.8'
services:
  java-app:
    build: .
    image: tarunsepta/java-sample-app:latest
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
  mysql-db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase
    ports:
      - "3306:3306"
  redis-cache:
    image: redis:latest
    ports:
      - "6379:6379"